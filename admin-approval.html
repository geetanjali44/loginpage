<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #5b1600, #120700);
            color: #fff;
            padding: 18px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
        }

        h1 {
            color: #ffcc00;
            font-size: 22px;
        }

        .home-btn {
            color: #fff;
            background: #2563eb;
            padding: 10px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            white-space: nowrap;
        }

        .user-card {
            padding: 15px;
            border-radius: 18px;
            background: rgba(255,255,255,0.13);
            border: 1px solid rgba(255,204,0,0.45);
            margin-bottom: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        .user-card h3 {
            color: #ffcc00;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .user-card p {
            color: #fff3c4;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status.pending {
            background: #f59e0b;
            color: #111;
        }

        .status.approved {
            background: #16a34a;
            color: #fff;
        }

        .status.rejected {
            background: #dc2626;
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            height: 40px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        .approve-btn {
            background: #16a34a;
        }

        .reject-btn {
            background: #dc2626;
        }

        .pending-btn {
            background: #f59e0b;
            color: #111;
        }

        .empty {
            text-align: center;
            color: #fff3c4;
            margin-top: 40px;
            font-size: 16px;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .btn-row {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>Admin Approval</h1>
        <a href="home.html" class="home-btn">Home</a>
    </div>

    <div id="usersList"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="admin-approval.js"></script>

</body>
</html>
