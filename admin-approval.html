<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    html, body {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #500250c5, #04344527);
        color: #fff;
        padding: 18px;
    }

    .topbar {
        width: 100%;
        max-width: 900px;
        margin: 0 auto 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid rgba(255, 204, 0, 0.35);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
    }

    h1 {
        color: #ffcc00;
        font-size: 24px;
        font-weight: 900;
        line-height: 1.2;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }

    .home-btn {
        color: #fff;
        background: linear-gradient(135deg, #eb9225, #df3b25);
        padding: 11px 16px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 900;
        white-space: nowrap;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.38);
    }

    #usersList {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
    }

    .user-card {
        width: 100%;
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.13);
        border: 1px solid rgba(255, 204, 0, 0.45);
        margin-bottom: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
    }

    .user-card h3 {
        color: #ffcc00;
        margin-bottom: 10px;
        font-size: 19px;
        font-weight: 900;
    }

    .user-card p {
        color: #fff3c4;
        margin-bottom: 7px;
        font-size: 14px;
        line-height: 1.45;
        word-break: break-word;
    }

    .user-card strong {
        color: #fff;
    }

    .status {
        display: inline-block;
        padding: 5px 11px;
        border-radius: 20px;
        font-weight: 900;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .status.pending {
        background: #f59e0b;
        color: #111;
    }

    .status.approved {
        background: #16a34a;
        color: #fff;
    }

    .status.rejected {
        background: #dc2626;
        color: #fff;
    }

.btn-row {
    display: flex;
    justify-content: flex-start;
    gap: 6px;
    margin-top: 8px;
}

button {
    flex: 0 0 auto;
    width: 78px;
    height: 30px;
    border: none;
    border-radius: 9px;
    color: #fff;
    font-weight: 900;
    cursor: pointer;
    font-size: 11px;
    padding: 0;
}

.approve-btn {
    background: linear-gradient(135deg, #22c55e, #15803d);
}

.reject-btn {
    background: linear-gradient(135deg, #ef4444, #991b1b);
}

.pending-btn {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #241000;
}

button:active {
    transform: scale(0.96);
}

    .approve-btn {
        background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .reject-btn {
        background: linear-gradient(135deg, #ef4444, #991b1b);
    }

    .pending-btn {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #241000;
    }

    .empty {
        width: 100%;
        text-align: center;
        color: #fff3c4;
        margin-top: 42px;
        font-size: 16px;
        font-weight: 800;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid rgba(255, 204, 0, 0.35);
    }

    /* MOBILE VIEW */
    @media (max-width: 600px) {
        body {
            padding: 12px;
        }

        .topbar {
            position: sticky;
            top: 10px;
            z-index: 20;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
        }

        .home-btn {
            padding: 10px 13px;
            border-radius: 12px;
            font-size: 14px;
        }

        .user-card {
            padding: 14px;
            border-radius: 18px;
            margin-bottom: 13px;
        }

        .user-card h3 {
            font-size: 17px;
        }

        .user-card p {
            font-size: 13px;
        }

        .btn-row {
            flex-direction: column;
            gap: 9px;
        }

        button {
            width: 100%;
            height: 43px;
            font-size: 14px;
        }

        .empty {
            margin-top: 30px;
            font-size: 14px;
            padding: 16px;
        }
    }

    /* SMALL MOBILE */
    @media (max-width: 380px) {
        h1 {
            font-size: 18px;
        }

        .home-btn {
            font-size: 13px;
            padding: 9px 11px;
        }

        .user-card {
            padding: 13px;
        }

        .status {
            font-size: 11px;
            padding: 5px 9px;
        }
    }
    @media (max-width: 600px) {
    .btn-row {
        flex-direction: row;
        gap: 6px;
        margin-top: 8px;
    }

    button {
        width: 74px;
        height: 29px;
        font-size: 10px;
        border-radius: 8px;
    }
}
</style>
</head>
<body>

    <div class="topbar">
        <h1>Admin Approval</h1>
        <a href="home.html" class="home-btn">Home</a>
    </div>

    <div id="usersList"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="admin-approval.js"></script>

</body>
</html>
