<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganesh Login</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<img src="images/m1.webp" class="mouse-corner mouse-left" alt="Mouse Left">
<img src="images/m2.webp" class="mouse-corner mouse-right" alt="Mouse Right">

<div class="top-fixed-text">
    <span class="happy-text">Sri Varasidhi Vinayaka</span>
    <span class="festival-text">Utsav Committee</span>
</div>

<div class="main-box">

    <div class="ganesh-zone">

        <div class="flower-stream"></div>

        <div class="ganesh-round">
            <img src="images/ganesh.webp" alt="Ganesh">
        </div>

    </div>

    <div class="login-details">
        <h2>गणपति बप्पा मोरया</h2>
        <p>Login to continue</p>

        <form id="loginForm">

            <div class="input-with-mouse">
                <div class="mobile-input-box">
                    <span class="country-code">+91</span>

                    <input
                        type="tel"
                        id="mobileInput"
                        placeholder="Enter Mobile Number"
                        maxlength="10"
                        required
                    >
                </div>

                <img src="images/mouseinput.webp" class="input-corner-mouse" alt="Mouse">
            </div>

            <div class="password-box" id="passwordBox">
                <input
                    type="password"
                    id="passwordInput"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit" class="done-btn">
                    Done
                </button>
            </div>

            <p id="loginMessage" style="margin-top:12px;color:#ffcc00;font-weight:800;text-align:center;"></p>

        </form>
    </div>

</div>

<div class="bottom-scroll-text">
    <div class="bottom-scroll-track">
        <img src="images/l1.webp" class="bottom-scroll-img" alt="">
        Vijay || Vinay || sailu || Keerthi || Geetanjali || Jyothi
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
